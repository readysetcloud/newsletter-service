openapi: 3.0.0
info:
  title: Newsletter Public API
  description: |
    Public endpoints for content management
  version: 1.0.0

x-amazon-apigateway-request-validators:
  Validate All:
    validateRequestParameters: true
    validateRequestBody: true
x-amazon-apigateway-gateway-responses:
  BAD_REQUEST_BODY:
    statusCode: 400
    responseTemplates:
      application/json: '{ "message": "$context.error.validationErrorString" }'
    responseParameters:
      gatewayresponse.header.Access-Control-Allow-Origin:
        Fn::Sub: "'${Origin}'"

tags:
  - name: Subscription
  - name: Tracking
  - name: Engagement
  - name: Links
paths:
  /links:
    post:
      summary: Mint a tracked short link
      description: |
        Allocates a unique 6-character short code, writes it to the campaign-link
        CloudFront KeyValueStore, and returns the wrapped short URL. The `src`
        field is an optional default traffic-source label baked into the link;
        per-click `?src=` query parameters override it.
      tags:
        - Links
      security:
        - ApiKeyHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MintLinkRequest"
      responses:
        200:
          description: Short link minted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Link"
        400:
          $ref: "#/components/responses/BadRequest"
        503:
          description: Could not allocate a unique short code after multiple attempts
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        500:
          $ref: "#/components/responses/UnknownError"
      x-amazon-apigateway-request-validator: Validate All
      x-amazon-apigateway-integration:
        uri:
          Fn::Sub: arn:${AWS::Partition}:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${MintCampaignLinkFunction.Arn}/invocations
        httpMethod: POST
        type: aws_proxy

  /links/{code}:
    parameters:
      - name: code
        in: path
        required: true
        schema:
          type: string
          pattern: '^[A-Za-z0-9]{6}$'
        description: The 6-character base62 short code
    get:
      summary: Get a tracked link's metadata
      tags:
        - Links
      security:
        - ApiKeyHeader: []
      responses:
        200:
          description: Link metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Link"
        400:
          $ref: "#/components/responses/BadRequest"
        404:
          description: Code not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        500:
          $ref: "#/components/responses/UnknownError"
      x-amazon-apigateway-integration:
        uri:
          Fn::Sub: arn:${AWS::Partition}:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${GetCampaignLinkFunction.Arn}/invocations
        httpMethod: POST
        type: aws_proxy
    put:
      summary: Replace a tracked link's destination
      description: |
        Wholesale replace of the link's destination URL and optional src.
        Updates both the CloudFront KeyValueStore and the Dynamo metadata.
        The short code stays the same; existing references keep working but
        now redirect to the new destination.
      tags:
        - Links
      security:
        - ApiKeyHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PutLinkRequest"
      responses:
        200:
          description: Link updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Link"
        400:
          $ref: "#/components/responses/BadRequest"
        404:
          description: Code not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        500:
          $ref: "#/components/responses/UnknownError"
      x-amazon-apigateway-request-validator: Validate All
      x-amazon-apigateway-integration:
        uri:
          Fn::Sub: arn:${AWS::Partition}:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${PutCampaignLinkFunction.Arn}/invocations
        httpMethod: POST
        type: aws_proxy
    delete:
      summary: Retire a short link
      description: |
        Removes the short code from the CloudFront KeyValueStore and deletes
        all rows under its partition (metadata, aggregate, and any click
        events). Subsequent visits fall through to the fallback origin.
        Already-deleted codes return 204 (idempotent).
      tags:
        - Links
      security:
        - ApiKeyHeader: []
      responses:
        204:
          description: Code retired (or was already gone)
        400:
          $ref: "#/components/responses/BadRequest"
        500:
          $ref: "#/components/responses/UnknownError"
      x-amazon-apigateway-integration:
        uri:
          Fn::Sub: arn:${AWS::Partition}:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${DeleteCampaignLinkFunction.Arn}/invocations
        httpMethod: POST
        type: aws_proxy

  /links/{code}/analytics:
    parameters:
      - name: code
        in: path
        required: true
        schema:
          type: string
          pattern: '^[A-Za-z0-9]{6}$'
    get:
      summary: Get click analytics for a short code
      description: |
        Returns the running aggregate maintained by the click consumer.
        Empty (zero clicks) returns 200 with zeroed fields, not 404, so
        callers can poll without special-casing newly minted links.
      tags:
        - Links
      security:
        - ApiKeyHeader: []
      responses:
        200:
          description: Analytics for the short code
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LinkAnalytics"
        400:
          $ref: "#/components/responses/BadRequest"
        500:
          $ref: "#/components/responses/UnknownError"
      x-amazon-apigateway-integration:
        uri:
          Fn::Sub: arn:${AWS::Partition}:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${GetCampaignLinkAnalyticsFunction.Arn}/invocations
        httpMethod: POST
        type: aws_proxy

  /{tenant}/subscribers:
    parameters:
      - $ref: "#/components/parameters/Tenant"
    post:
      summary: Add a new subscriber
      tags:
        - Subscription
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Subscriber"
      responses:
        201:
          $ref: "#/components/responses/Created"
        400:
          $ref: "#/components/responses/BadRequest"
        500:
          $ref: "#/components/responses/UnknownError"
      x-amazon-apigateway-request-validator: Validate All
      x-amazon-apigateway-integration:
        uri:
          Fn::Sub: arn:${AWS::Partition}:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${AddSubscriberFunction.Arn}/invocations
        httpMethod: POST
        type: aws_proxy

  /{tenant}/unsubscribe:
    parameters:
      - $ref: "#/components/parameters/Tenant"
    get:
      summary: Unsubscribe from newsletter
      parameters:
        - name: email
          in: query
          required: true
          schema:
            type: string
          description: Hashed email address for unsubscribe
      tags:
        - Subscription
      responses:
        200:
          description: Unsubscribe confirmation page
          content:
            text/html:
              schema:
                type: string
        400:
          $ref: "#/components/responses/BadRequest"
        404:
          $ref: "#/components/responses/NotFound"
        500:
          $ref: "#/components/responses/UnknownError"
      x-amazon-apigateway-request-validator: Validate All
      x-amazon-apigateway-integration:
        uri:
          Fn::Sub: arn:${AWS::Partition}:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${UnsubscribeFunction.Arn}/invocations
        httpMethod: POST
        type: aws_proxy
    post:
      summary: Unsubscribe manually
      tags:
        - Subscription
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  format: email
                  description: Email address to unsubscribe
              required: [email]
      responses:
        200:
          description: The user was successfully unsubscribed
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Successfully unsubscribed
                required: [message]
        400:
          $ref: "#/components/responses/BadRequest"
        404:
          $ref: "#/components/responses/NotFound"
        500:
          $ref: "#/components/responses/UnknownError"
      x-amazon-apigateway-request-validator: Validate All
      x-amazon-apigateway-integration:
        uri:
          Fn::Sub: arn:${AWS::Partition}:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${ManualUnsubscribeFunction.Arn}/invocations
        httpMethod: POST
        type: aws_proxy

  /{tenant}/{issueId}/votes:
    parameters:
      - $ref: "#/components/parameters/Tenant"
      - $ref: "#/components/parameters/IssueId"
    post:
      summary: Submit a vote
      tags:
        - Engagement
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                choice:
                  type: string
                  description: Selection for the vote
              required: [choice]
      responses:
        200:
          description: The vote was submitted and results were returned
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        400:
          $ref: "#/components/responses/BadRequest"
        404:
          $ref: "#/components/responses/NotFound"
        500:
          $ref: "#/components/responses/UnknownError"
      x-amazon-apigateway-request-validator: Validate All
      x-amazon-apigateway-integration:
        uri:
          Fn::Sub: arn:${AWS::Partition}:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${VoteFunction.Arn}/invocations
        httpMethod: POST
        type: aws_proxy

components:
  parameters:
    Tenant:
      name: tenant
      in: path
      required: true
      schema:
        type: string
      description: The tenant identifier
    IssueId:
      name: issueId
      in: path
      required: true
      schema:
        type: string
        description: Issue id

  securitySchemes:
    ApiKeyHeader:
      type: apiKey
      in: header
      name: Authorization
      description: |
        Tenant-scoped API key value. Mint one via the dashboard's
        POST /api-keys endpoint, then send it raw (no `Bearer ` prefix)
        in the `Authorization` header. The Lambda authorizer validates
        the key against the tenant API keys table.

  schemas:
    Subscriber:
      description: New subscriber details
      type: object
      required:
        - email
      properties:
        email:
          type: string
          description: Email address
          minLength: 4
        firstName:
          type: string
        lastName:
          type: string
        website:
          type: string
          description: Honeypot field — should be empty for legitimate signups
        elapsedMs:
          type: integer
          minimum: 0
          description: Client-reported time between form render and submit (ms)

    MintLinkRequest:
      description: Body for POST /links
      type: object
      required:
        - url
      properties:
        url:
          type: string
          description: Destination URL the short code redirects to
          minLength: 1
          maxLength: 2048
          pattern: '^https?://'
        src:
          type: string
          description: Default traffic-source label baked into the short link (can be overridden per click via ?src=)
          maxLength: 64
        expiresInDays:
          type: integer
          minimum: 1
          maximum: 1825
          description: |
            How long the short code remains active. Defaults to 730 (2 years).
            After this window, the daily sweeper removes the code from both the
            KeyValueStore and the Dynamo sentinel.

    PutLinkRequest:
      description: Body for PUT /links/{code} (wholesale replace of url + src)
      type: object
      required:
        - url
      properties:
        url:
          type: string
          minLength: 1
          maxLength: 2048
          pattern: '^https?://'
        src:
          type: string
          maxLength: 64
          nullable: true

    Link:
      description: A tracked short link
      type: object
      required:
        - code
        - short_url
        - url
        - created_at
        - expires_at
      properties:
        code:
          type: string
          minLength: 6
          maxLength: 6
        short_url:
          type: string
        url:
          type: string
        src:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        expires_at:
          type: string
          format: date-time

    LinkAnalytics:
      description: Click analytics for a short code
      type: object
      required:
        - code
        - total_clicks
        - by_day
        - by_src
      properties:
        code:
          type: string
        total_clicks:
          type: integer
          minimum: 0
        by_day:
          type: object
          description: Map of YYYY-MM-DD to click count
          additionalProperties:
            type: integer
            minimum: 0
        by_src:
          type: object
          description: Map of source label to click count
          additionalProperties:
            type: integer
            minimum: 0
        first_click_at:
          type: string
          format: date-time
          nullable: true
        last_click_at:
          type: string
          format: date-time
          nullable: true

  responses:
    Created:
      description: Successfully added into the system
      content:
        application/json:
          schema:
            type: object
            required:
              - message
            properties:
              message:
                type: string
                description: Message resulting from a creation
                example: Contact created
    BadRequest:
      description: Unable to process request. Likely due to improperly formatted request.
      content:
        application/json:
          schema:
            type: object
            required:
              - message
            properties:
              message:
                type: string
                description: Message detailing what went wrong
                example: The 'name' field is required and is missing.
    NotFound:
      description: The requested entity was not found
      content:
        application/json:
          schema:
            type: object
            required:
              - message
            properties:
              message:
                type: string
                description: The requested entity was not found
                example: Vote not found
    UnknownError:
      description: An unexpected error occurred on the server.
      content:
        application/json:
          schema:
            type: object
            required:
              - message
            properties:
              message:
                type: string
                description: Unknown error message
                example: An unexpected error occurred.
