name: Deploy to Stage via Pull Request

on:
  workflow_dispatch:
    inputs:
      force_deploy:
        description: Force backend + frontend stage deploy regardless of detected changes
        required: false
        type: boolean
        default: true
  pull_request:
    branches:
      - main

concurrency:
  group: newsletter-service-stage
  cancel-in-progress: false

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  changes:
    name: Detect deploy changes
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      backend_changed: ${{ steps.detect.outputs.backend_changed }}
      frontend_changed: ${{ steps.detect.outputs.frontend_changed }}
      js_changed: ${{ steps.detect.outputs.js_changed }}
      rust_changed: ${{ steps.detect.outputs.rust_changed }}
      deploy_needed: ${{ steps.detect.outputs.deploy_needed }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Detect backend and frontend changes
        id: detect
        shell: bash
        run: |
          set -euo pipefail

          # workflow_dispatch: honor the force_deploy input directly.
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            force="${{ inputs.force_deploy }}"
            echo "backend_changed=${force}" >> "$GITHUB_OUTPUT"
            echo "frontend_changed=${force}" >> "$GITHUB_OUTPUT"
            echo "js_changed=${force}" >> "$GITHUB_OUTPUT"
            echo "rust_changed=${force}" >> "$GITHUB_OUTPUT"
            echo "deploy_needed=${force}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
            HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          else
            HEAD_SHA="${{ github.sha }}"
            BASE_SHA="$(git rev-parse "${HEAD_SHA}^" 2>/dev/null || true)"
          fi

          if [[ -z "${BASE_SHA}" ]]; then
            echo "backend_changed=true" >> "$GITHUB_OUTPUT"
            echo "frontend_changed=true" >> "$GITHUB_OUTPUT"
            echo "deploy_needed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Use `git log --name-only` over BASE..HEAD instead of `git diff
          # BASE HEAD`. The diff form has been observed to return empty on
          # the runner for valid SHA pairs (PR #240 hit this: diff between
          # 67329ca..74ddef3 returned empty even though template.yaml was
          # changed). The log form enumerates files touched by every commit
          # in the range and is robust to whatever runner-side quirk causes
          # the diff form to misbehave. Mirrors the fix applied to
          # deploy.yaml in PR #237.
          changed_files="$(git log --name-only --pretty=format: "${BASE_SHA}..${HEAD_SHA}" 2>/dev/null | sort -u | grep -v '^$' || true)"

          # Backstop: if detection returned nothing despite a non-empty
          # range, force deploy_needed=true. Re-deploying a no-op is
          # cheaper than silently skipping a real change.
          if [[ -z "${changed_files}" && "${BASE_SHA}" != "${HEAD_SHA}" ]]; then
            echo "WARNING: no files detected between ${BASE_SHA}..${HEAD_SHA}; forcing deploy" >&2
            echo "backend_changed=true" >> "$GITHUB_OUTPUT"
            echo "frontend_changed=true" >> "$GITHUB_OUTPUT"
            echo "js_changed=true" >> "$GITHUB_OUTPUT"
            echo "rust_changed=true" >> "$GITHUB_OUTPUT"
            echo "deploy_needed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          backend_changed=false
          frontend_changed=false
          js_changed=false
          rust_changed=false

          while IFS= read -r file; do
            [[ -z "${file}" ]] && continue

            case "${file}" in
              dashboard-ui/*|scripts/deploy-ui.mjs)
                frontend_changed=true
                js_changed=true
                ;;
            esac

            case "${file}" in
              crates/*|functions/*|state-machines/*|templates/*|Cargo.toml|template.yaml|openapi.yaml|publicapi.yaml|package.json|package-lock.json|samconfig.toml)
                backend_changed=true
                ;;
            esac

            case "${file}" in
              functions/*|scripts/*|__tests__/*|__mocks__/*|package.json|package-lock.json|eslint.config.js|jest.config.mjs|babel.config.json|dashboard-ui/*)
                js_changed=true
                ;;
            esac

            case "${file}" in
              crates/*|Cargo.toml)
                rust_changed=true
                ;;
            esac
          done <<< "${changed_files}"

          if [[ "${backend_changed}" == "true" || "${frontend_changed}" == "true" ]]; then
            deploy_needed=true
          else
            deploy_needed=false
          fi

          echo "backend_changed=${backend_changed}" >> "$GITHUB_OUTPUT"
          echo "frontend_changed=${frontend_changed}" >> "$GITHUB_OUTPUT"
          echo "js_changed=${js_changed}" >> "$GITHUB_OUTPUT"
          echo "rust_changed=${rust_changed}" >> "$GITHUB_OUTPUT"
          echo "deploy_needed=${deploy_needed}" >> "$GITHUB_OUTPUT"

  predeploy-validations:
    name: Pre-deploy validations
    needs: changes
    if: needs.changes.outputs.deploy_needed == 'true'
    uses: ./.github/workflows/pre-deploy-validation.yaml
    with:
      run_js: ${{ needs.changes.outputs.js_changed == 'true' }}
      run_rust: ${{ needs.changes.outputs.rust_changed == 'true' }}
      run_backend_gate: ${{ needs.changes.outputs.backend_changed == 'true' }}

  deploy-backend:
    name: Deploy Backend
    needs: [changes, predeploy-validations]
    if: |
      github.actor != 'dependabot[bot]' &&
      needs.changes.outputs.backend_changed == 'true'
    environment: stage
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust toolchain with Cargo Lambda
        uses: moonrepo/setup-rust@v1
        with:
          bins: cargo-lambda
          targets: aarch64-unknown-linux-gnu
      - name: Install Zig toolchain
        uses: mlugg/setup-zig@v2
        with:
          version: 0.14.0
      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-region: us-east-1
          aws-access-key-id: ${{ secrets.STAGE_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.STAGE_SECRET_KEY }}
      - name: SAM Build and Deploy
        run: |
          npm install -g esbuild
          npm install --no-fund --no-audit

          sam --info
          sam build --beta-features

          sam deploy \
          --stack-name newsletter-service \
          --resolve-s3 \
          --no-fail-on-empty-changeset \
          --capabilities CAPABILITY_IAM \
          --parameter-overrides Environment=stage EncryptionKey=${{secrets.ENCRYPTION_KEY}} VerifiedFromEmail=${{vars.VERIFIED_FROM_EMAIL}}

  deploy-frontend:
    name: Deploy Frontend
    needs: [changes, predeploy-validations, deploy-backend]
    if: |
      always() &&
      github.actor != 'dependabot[bot]' &&
      needs.predeploy-validations.result == 'success' &&
      (needs.deploy-backend.result == 'success' || needs.deploy-backend.result == 'skipped') &&
      (needs.changes.outputs.frontend_changed == 'true' || needs.changes.outputs.backend_changed == 'true')
    environment: stage
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-region: us-east-1
          aws-access-key-id: ${{ secrets.STAGE_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.STAGE_SECRET_KEY }}
      - name: Setup Node.js for Frontend
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: dashboard-ui/package-lock.json
      - name: Deploy Frontend
        run: |
          node scripts/deploy-ui.mjs --ci --stack-name newsletter-service --region us-east-1

  deploy-backend-dependabot:
    name: Deploy Backend Dependabot Updates
    needs: [changes, predeploy-validations]
    if: |
      github.actor == 'dependabot[bot]' &&
      github.event_name == 'pull_request' &&
      needs.changes.outputs.backend_changed == 'true'
    environment: stage
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      pull-requests: write
      contents: write
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust toolchain with Cargo Lambda
        uses: moonrepo/setup-rust@v1
        with:
          bins: cargo-lambda
          targets: aarch64-unknown-linux-gnu
      - name: Install Zig toolchain
        uses: mlugg/setup-zig@v2
        with:
          version: 0.14.0
      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-region: us-east-1
          aws-access-key-id: ${{ secrets.DEPENDABOT_STAGE_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.DEPENDABOT_STAGE_SECRET_KEY }}
      - name: SAM Build and Deploy
        run: |
          npm install -g esbuild
          npm install --no-fund --no-audit

          sam --info
          sam build --beta-features

          sam deploy \
          --stack-name newsletter-service \
          --resolve-s3 \
          --no-fail-on-empty-changeset \
          --capabilities CAPABILITY_IAM \
          --parameter-overrides Environment=stage EncryptionKey=${{secrets.ENCRYPTION_KEY}} VerifiedFromEmail=${{vars.VERIFIED_FROM_EMAIL}}

  deploy-frontend-dependabot:
    name: Deploy Frontend Dependabot Updates
    needs: [changes, predeploy-validations, deploy-backend-dependabot]
    if: |
      always() &&
      github.actor == 'dependabot[bot]' &&
      github.event_name == 'pull_request' &&
      needs.predeploy-validations.result == 'success' &&
      (needs.deploy-backend-dependabot.result == 'success' || needs.deploy-backend-dependabot.result == 'skipped') &&
      (needs.changes.outputs.frontend_changed == 'true' || needs.changes.outputs.backend_changed == 'true')
    environment: stage
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      pull-requests: write
      contents: write
    steps:
      - uses: actions/checkout@v6
      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-region: us-east-1
          aws-access-key-id: ${{ secrets.DEPENDABOT_STAGE_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.DEPENDABOT_STAGE_SECRET_KEY }}
      - name: Setup Node.js for Frontend
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: dashboard-ui/package-lock.json
      - name: Deploy Frontend
        run: |
          node scripts/deploy-ui.mjs --ci --stack-name newsletter-service --region us-east-1

  auto-merge-dependabot-update:
    name: Auto Merge Dependabot Update
    needs: [deploy-backend-dependabot, deploy-frontend-dependabot]
    if: |
      github.actor == 'dependabot[bot]' &&
      github.event_name == 'pull_request' &&
      (needs.deploy-backend-dependabot.result == 'success' || needs.deploy-backend-dependabot.result == 'skipped') &&
      (needs.deploy-frontend-dependabot.result == 'success' || needs.deploy-frontend-dependabot.result == 'skipped')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      pull-requests: write
      contents: write
    steps:
      - name: Dependabot metadata
        id: dependabot-metadata
        uses: dependabot/fetch-metadata@v3
      - uses: actions/checkout@v6
      - name: Approve a PR if not already approved
        if: ${{ steps.dependabot-metadata.outputs.update-type == 'version-update:semver-minor' || steps.dependabot-metadata.outputs.update-type == 'version-update:semver-patch' || steps.dependabot-metadata.outputs.package-ecosystem == 'github_actions' }}
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr checkout "$PR_URL"

          if [ "$(gh pr status --json reviewDecision -q .currentBranch.reviewDecision)" != "APPROVED" ]; then
            gh pr review --approve "$PR_URL"
          fi

          gh pr merge --auto --merge "$PR_URL"
