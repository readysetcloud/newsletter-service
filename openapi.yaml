openapi: 3.0.0
info:
  title: Newsletter Dashboard
  description: |
    Used to manage your newsletter account, profile, API keys, and sender emails.

    ## Architecture Notes

    Admin endpoints (profile, brand, API keys) are handled by a consolidated Lambda function
    using a proxy routing pattern. All admin routes are routed through `/admin/{proxy+}` to
    the AdminFunction, which internally routes requests to the appropriate handler based on
    HTTP method and path.

    This architecture provides:
    - Reduced cold start overhead (single function vs multiple functions)
    - Simplified deployment and maintenance
    - Consistent error handling and logging
    - Shared authentication and authorization logic
  version: 1.0.0

tags:
  - name: API Keys
  - name: Profile
  - name: Senders
  - name: Issues
  - name: Pricing
  - name: Subscribers
  - name: Segments

paths:
  /dashboard:
    get:
      summary: Dashboard
      responses:
        "200":
          description: Load summary data for a dashboard
          content:
            application/json:
              schema:
                type: object
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/UnknownError"

  /me:
    get:
      summary: Get my complete profile
      description: Retrieves the authenticated user's complete profile including brand and personal details
      tags:
        - Profile
      responses:
        "200":
          description: Complete user profile
          content:
            application/json:
              schema:
                type: object
                properties:
                  userId:
                    type: string
                  email:
                    type: string
                  username:
                    type: string
                    nullable: true
                  # Brand & Business Details
                  brand:
                    type: object
                    properties:
                      brandName:
                        type: string
                        nullable: true
                      website:
                        type: string
                        nullable: true
                      industry:
                        type: string
                        nullable: true
                      brandDescription:
                        type: string
                        nullable: true
                      brandLogo:
                        type: string
                        nullable: true
                      tags:
                        type: array
                        items:
                          type: string
                        nullable: true
                  # Personal Details
                  profile:
                    type: object
                    properties:
                      firstName:
                        type: string
                        nullable: true
                      lastName:
                        type: string
                        nullable: true
                      links:
                        type: array
                        items:
                          type: object
                          properties:
                            name:
                              type: string
                            url:
                              type: string
                        nullable: true
                  # Preferences
                  preferences:
                    type: object
                    properties:
                      timezone:
                        type: string
                        nullable: true
                      locale:
                        type: string
                        nullable: true
                  # Metadata
                  lastModified:
                    type: string
                    format: date-time
                  profileUpdatedAt:
                    type: string
                    format: date-time
                    nullable: true
                  brandUpdatedAt:
                    type: string
                    format: date-time
                    nullable: true
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/UnknownError"
    put:
      summary: Update my personal profile
      description: Updates the authenticated user's personal information and preferences
      tags:
        - Profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                firstName:
                  type: string
                  maxLength: 50
                  description: User's first name
                lastName:
                  type: string
                  maxLength: 50
                  description: User's last name
                timezone:
                  type: string
                  maxLength: 50
                  description: User's timezone (e.g., America/New_York)
                locale:
                  type: string
                  maxLength: 10
                  pattern: "^[a-z]{2}(-[A-Z]{2})?$"
                  description: User's locale (e.g., en-US)
                links:
                  type: array
                  items:
                    type: object
                    properties:
                      name:
                        type: string
                        maxLength: 100
                      url:
                        type: string
                        maxLength: 500
                    required: [name, url]
                  maxItems: 10
                  description: User's social/professional links
              additionalProperties: false
              minProperties: 1
      responses:
        "200":
          description: Personal profile updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  profile:
                    type: object
                    properties:
                      firstName:
                        type: string
                        nullable: true
                      lastName:
                        type: string
                        nullable: true
                      timezone:
                        type: string
                        nullable: true
                      locale:
                        type: string
                        nullable: true
                      links:
                        type: array
                        items:
                          type: object
                          properties:
                            name:
                              type: string
                            url:
                              type: string
                        nullable: true
                      updatedAt:
                        type: string
                        format: date-time
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/UnknownError"

  /profiles/{userId}:
    parameters:
      - name: userId
        in: path
        required: true
        schema:
          type: string
        description: The user id to look up
    get:
      summary: Get public profile by user id
      description: Retrieves another user's public profile information
      tags:
        - Profile
      responses:
        "200":
          description: Public user profile
          content:
            application/json:
              schema:
                type: object
                properties:
                  brand:
                    type: object
                    properties:
                      brandName:
                        type: string
                        nullable: true
                      website:
                        type: string
                        nullable: true
                      industry:
                        type: string
                        nullable: true
                      brandDescription:
                        type: string
                        nullable: true
                      brandLogo:
                        type: string
                        nullable: true
                      tags:
                        type: array
                        items:
                          type: string
                        nullable: true
                  profile:
                    type: object
                    properties:
                      firstName:
                        type: string
                        nullable: true
                      lastName:
                        type: string
                        nullable: true
                      links:
                        type: array
                        items:
                          type: object
                          properties:
                            name:
                              type: string
                            url:
                              type: string
                        nullable: true
                  lastModified:
                    type: string
                    format: date-time
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/UnknownError"

  /brand/logo:
    post:
      summary: Generate presigned URL for brand photo upload
      description: Generates a presigned URL for uploading a brand photo to S3
      tags:
        - Profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - fileName
                - contentType
              properties:
                fileName:
                  type: string
                  maxLength: 255
                  description: Name of the file to upload
                contentType:
                  type: string
                  enum:
                    [
                      "image/jpeg",
                      "image/jpg",
                      "image/png",
                      "image/gif",
                      "image/webp",
                    ]
                  description: MIME type of the image file
              additionalProperties: false
      responses:
        "200":
          description: Presigned URL generated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  uploadUrl:
                    type: string
                    description: Presigned URL for uploading the file
                  key:
                    type: string
                    description: S3 key where the file will be stored
                  expiresIn:
                    type: number
                    description: URL expiration time in seconds
                  maxSize:
                    type: number
                    description: Maximum file size in bytes (2MB)
                  publicUrl:
                    type: string
                    description: Public URL where the file will be accessible
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/UnknownError"

    put:
      summary: Confirm brand photo upload
      description: Confirms that a brand photo has been successfully uploaded and updates the tenant record
      tags:
        - Profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - key
              properties:
                key:
                  type: string
                  description: S3 key of the uploaded file
                fileName:
                  type: string
                  description: Original file name
              additionalProperties: false
      responses:
        "200":
          description: Brand photo confirmed and tenant record updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  photoUrl:
                    type: string
                    description: Public URL of the uploaded photo
                  key:
                    type: string
                    description: S3 key of the uploaded file
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/UnknownError"

  /brand/validate:
    get:
      summary: Validate brand ID
      description: Validates a brand ID format and checks if it's available for use as a tenant identifier
      parameters:
        - name: brandId
          in: query
          required: true
          schema:
            type: string
            minLength: 3
            maxLength: 50
            pattern: "^[a-z]+$"
          description: The brand ID to validate for availability
      responses:
        "200":
          description: Brand ID availability check result
          content:
            application/json:
              schema:
                type: object
                properties:
                  available:
                    type: boolean
                    description: Whether the brand ID is available
                  brandId:
                    type: string
                    description: The brand ID that was checked
                  suggestions:
                    type: array
                    description: Alternative brand ID suggestions if not available
                    items:
                      type: string
                  error:
                    type: string
                    description: Error message if brand ID format is invalid
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/UnknownError"

  /brand:
    put:
      summary: Update my brand details
      description: Updates the authenticated user's brand and business information
      tags:
        - Profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                brandId:
                  type: string
                  minLength: 3
                  maxLength: 50
                  pattern: "^[a-z]+$"
                  description: Unique brand identifier (becomes tenant ID and subdomain)
                brandName:
                  type: string
                  maxLength: 100
                  description: Brand or business name (primary identifier)
                website:
                  type: string
                  maxLength: 200
                  pattern: "^https?://.+"
                  description: Brand website URL
                industry:
                  type: string
                  maxLength: 100
                  description: Industry or business category
                brandDescription:
                  type: string
                  maxLength: 500
                  description: Brand description or mission statement
                brandLogo:
                  type: string
                  maxLength: 500
                  description: URL to brand logo image
                tags:
                  type: array
                  items:
                    type: string
                    maxLength: 50
                  maxItems: 10
                  description: Brand tags for categorization
              additionalProperties: false
              minProperties: 1
      responses:
        "200":
          description: Brand details updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  brand:
                    type: object
                    properties:
                      brandName:
                        type: string
                        nullable: true
                      website:
                        type: string
                        nullable: true
                      industry:
                        type: string
                        nullable: true
                      brandDescription:
                        type: string
                        nullable: true
                      brandLogo:
                        type: string
                        nullable: true
                      tags:
                        type: array
                        items:
                          type: string
                        nullable: true
                      updatedAt:
                        type: string
                        format: date-time
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/UnknownError"

  /api-keys:
    post:
      summary: Create a new API key
      description: Creates a new API key for the authenticated user
      tags:
        - API Keys
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
              properties:
                name:
                  type: string
                  maxLength: 100
                  description: Human-readable name for the API key
                description:
                  type: string
                  maxLength: 500
                  description: Optional description of the API key's purpose
                expiresAt:
                  type: string
                  format: date-time
                  description: Optional expiration date (ISO 8601 format)
              additionalProperties: false
      responses:
        "201":
          description: API key created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  apiKey:
                    type: object
                    properties:
                      keyId:
                        type: string
                        description: Unique identifier for the API key
                      name:
                        type: string
                      description:
                        type: string
                        nullable: true
                      keyValue:
                        type: string
                        description: The actual API key value (only shown once)
                      tenantId:
                        type: string
                        nullable: true
                      createdAt:
                        type: string
                        format: date-time
                      expiresAt:
                        type: string
                        format: date-time
                        nullable: true
                      status:
                        type: string
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/UnknownError"

    get:
      summary: List API keys
      description: Lists all API keys for the authenticated user
      tags:
        - API Keys
      responses:
        "200":
          description: List of API keys
          content:
            application/json:
              schema:
                type: object
                properties:
                  apiKeys:
                    type: array
                    items:
                      type: object
                      properties:
                        keyId:
                          type: string
                        name:
                          type: string
                        description:
                          type: string
                          nullable: true
                        keyValue:
                          type: string
                          description: Always shows "***hidden***"
                        tenantId:
                          type: string
                          nullable: true
                        createdAt:
                          type: string
                          format: date-time
                        lastUsed:
                          type: string
                          format: date-time
                          nullable: true
                        usageCount:
                          type: number
                        expiresAt:
                          type: string
                          format: date-time
                          nullable: true
                        status:
                          type: string
                        revokedAt:
                          type: string
                          format: date-time
                          nullable: true
                  count:
                    type: number
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/UnknownError"

  /api-keys/{keyId}:
    parameters:
      - name: keyId
        in: path
        required: true
        schema:
          type: string
        description: The API key identifier
    get:
      summary: Get API key details
      description: Gets details of a specific API key (without the key value)
      tags:
        - API Keys
      responses:
        "200":
          description: API key details
          content:
            application/json:
              schema:
                type: object
                properties:
                  apiKey:
                    type: object
                    properties:
                      keyId:
                        type: string
                      name:
                        type: string
                      description:
                        type: string
                        nullable: true
                      keyValue:
                        type: string
                        description: Always shows "***hidden***"
                      tenantId:
                        type: string
                        nullable: true
                      createdAt:
                        type: string
                        format: date-time
                      lastUsed:
                        type: string
                        format: date-time
                        nullable: true
                      usageCount:
                        type: number
                      expiresAt:
                        type: string
                        format: date-time
                        nullable: true
                      status:
                        type: string
                      revokedAt:
                        type: string
                        format: date-time
                        nullable: true
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/UnknownError"

    delete:
      summary: Delete or revoke API key
      description: Deletes a specific API key permanently, or revokes it if revoke=true query parameter is provided
      tags:
        - API Keys
      parameters:
        - name: revoke
          in: query
          required: false
          schema:
            type: boolean
          description: If true, revokes the API key instead of deleting it
      responses:
        "200":
          description: API key deleted or revoked successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  keyId:
                    type: string
                  status:
                    type: string
                    description: Only present when revoking (status will be 'revoked')
                  revokedAt:
                    type: string
                    format: date-time
                    description: Only present when revoking
        "204":
          description: API key deleted successfully (no content)
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/UnknownError"

  /senders:
    get:
      summary: List sender emails
      tags:
        - Senders
      responses:
        "200":
          description: List of sender emails with tier limits
          content:
            application/json:
              schema:
                type: object
                properties:
                  senders:
                    type: array
                    items:
                      $ref: "#/components/schemas/SenderEmail"
                  tierLimits:
                    $ref: "#/components/schemas/TierLimits"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/UnknownError"

    post:
      summary: Create a new sender email
      tags:
        - Senders
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSenderRequest"
      responses:
        "201":
          description: Sender email created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SenderEmail"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          description: Tier limit exceeded or email already exists
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  tierLimits:
                    $ref: "#/components/schemas/TierLimits"
        "500":
          $ref: "#/components/responses/UnknownError"

  /senders/{senderId}:
    parameters:
      - name: senderId
        in: path
        required: true
        schema:
          type: string
        description: The sender ID
    get:
      summary: Get sender email verification status
      tags:
        - Senders
      responses:
        "200":
          description: Current sender verification status
          content:
            application/json:
              schema:
                type: object
                properties:
                  senderId:
                    type: string
                  email:
                    type: string
                  verificationStatus:
                    type: string
                    enum: [pending, verified, failed, verification_timed_out]
                  verificationType:
                    type: string
                    enum: [mailbox, domain]
                  domain:
                    type: string
                    nullable: true
                  isDefault:
                    type: boolean
                  createdAt:
                    type: string
                    format: date-time
                  updatedAt:
                    type: string
                    format: date-time
                  verifiedAt:
                    type: string
                    format: date-time
                    nullable: true
                  failureReason:
                    type: string
                    nullable: true
                  statusChanged:
                    type: boolean
                  sesStatus:
                    type: object
                    nullable: true
                  sesError:
                    type: string
                    nullable: true
                  lastChecked:
                    type: string
                    format: date-time
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/UnknownError"

    put:
      summary: Update sender email
      tags:
        - Senders
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSenderRequest"
      responses:
        "200":
          description: Sender email updated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SenderEmail"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/UnknownError"

    delete:
      summary: Delete sender email
      tags:
        - Senders
      responses:
        "204":
          description: Sender email deleted successfully
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/UnknownError"

  /senders/{senderId}/status:
    parameters:
      - name: senderId
        in: path
        required: true
        schema:
          type: string
        description: The sender ID
    get:
      summary: Get current sender verification status
      description: Check the current verification status of a sender email by querying both DynamoDB and SES directly
      tags:
        - Senders
      responses:
        "200":
          description: Current sender verification status
          content:
            application/json:
              schema:
                type: object
                properties:
                  senderId:
                    type: string
                  email:
                    type: string
                  name:
                    type: string
                    nullable: true
                  verificationType:
                    type: string
                    enum: [mailbox, domain]
                  verificationStatus:
                    type: string
                    enum: [pending, verified, failed, verification_timed_out]
                  isDefault:
                    type: boolean
                  domain:
                    type: string
                    nullable: true
                  createdAt:
                    type: string
                    format: date-time
                  updatedAt:
                    type: string
                    format: date-time
                  verifiedAt:
                    type: string
                    format: date-time
                    nullable: true
                  failureReason:
                    type: string
                    nullable: true
                  emailsSent:
                    type: integer
                  lastSentAt:
                    type: string
                    format: date-time
                    nullable: true
                  statusChanged:
                    type: boolean
                    description: Whether the status was updated during this request
                  sesStatus:
                    type: object
                    nullable: true
                    properties:
                      verificationStatus:
                        type: string
                      dkimStatus:
                        type: string
                      identityType:
                        type: string
                      error:
                        type: string
                  lastChecked:
                    type: string
                    format: date-time
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/UnknownError"

  /senders/verify-domain:
    post:
      summary: Initiate domain verification
      tags:
        - Senders
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VerifyDomainRequest"
      responses:
        "201":
          description: Domain verification initiated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DomainVerification"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          description: Domain already verified or verification in progress
        "500":
          $ref: "#/components/responses/UnknownError"

  /senders/domain-verification/{domain}:
    parameters:
      - name: domain
        in: path
        required: true
        schema:
          type: string
        description: The domain name
    get:
      summary: Get domain verification status and DNS records
      tags:
        - Senders
      responses:
        "200":
          description: Domain verification details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DomainVerification"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/UnknownError"

  /issues:
    get:
      summary: List all issues
      description: Retrieves a paginated list of newsletter issues for the authenticated user's tenant
      tags:
        - Issues
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
          description: Maximum number of issues to return (default 20, max 100)
        - name: nextToken
          in: query
          required: false
          schema:
            type: string
          description: Pagination token from previous response
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [draft, scheduled, published, failed]
          description: Filter issues by status
      responses:
        "200":
          description: List of issues
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListIssuesResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/UnknownError"

    post:
      summary: Create a new issue
      description: Creates a new issue (draft by default, or scheduled when action is "schedule")
      tags:
        - Issues
      parameters:
        - name: Idempotency-Key
          in: header
          required: false
          schema:
            type: string
          description: Idempotency key for safely retrying requests (stored for 24 hours)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateIssueRequest"
      responses:
        "201":
          description: Issue created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateIssueResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/UnknownError"

  /issues/trends:
    get:
      summary: Get issue performance trends
      description: Retrieves performance metrics for the N most recent published issues with aggregated statistics
      tags:
        - Issues
      parameters:
        - name: issueCount
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 50
            default: 10
          description: Number of recent published issues to return
      responses:
        "200":
          description: Issue trends and performance metrics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrendsResponse"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/UnknownError"

  /issues/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
        description: The issue ID (issue number as a string)
    get:
      summary: Get a single issue
      description: Retrieves detailed information about a specific issue including content and statistics
      tags:
        - Issues
      responses:
        "200":
          description: Issue details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetIssueResponse"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/UnknownError"

    put:
      summary: Update an issue
      description: Updates an existing issue. Draft issues can have their content modified. Issues with 'in progress' or 'failed' status can be marked as published.
      tags:
        - Issues
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateIssueRequest"
      responses:
        "200":
          description: Issue updated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetIssueResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "500":
          $ref: "#/components/responses/UnknownError"

    delete:
      summary: Delete an issue
      description: Permanently deletes a draft issue (published/scheduled issues cannot be deleted)
      tags:
        - Issues
      responses:
        "204":
          description: Issue deleted successfully
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "500":
          $ref: "#/components/responses/UnknownError"

  /issues/{id}/analytics/rebuild:
    post:
      summary: Rebuild issue analytics
      description: Queues an on-demand analytics rebuild for a published issue
      tags:
        - Issues
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: The issue ID
      responses:
        "202":
          description: Analytics rebuild queued
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: queued
                  issueId:
                    type: string
                  issueNumber:
                    type: integer
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/UnknownError"

  /issues/{id}/resend:
    post:
      summary: Resend a published issue
      description: Queues a resend workflow for an existing published issue
      tags:
        - Issues
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: The issue ID
      responses:
        "202":
          description: Resend workflow queued
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: queued
                  issueId:
                    type: string
                  issueNumber:
                    type: integer
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/UnknownError"

  /pricing:
    get:
      summary: Get current pricing
      description: Returns the latest sponsorship pricing calculation for the authenticated tenant
      tags:
        - Pricing
      responses:
        "200":
          description: Current pricing data
          content:
            application/json:
              schema:
                type: object
                properties:
                  current:
                    type: object
                    nullable: true
                    description: The latest pricing record (null if no pricing exists)
                  hasPricing:
                    type: boolean
                    description: Whether any pricing data exists
                  firstCalculationPending:
                    type: boolean
                    description: True if no pricing has ever been calculated
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/UnknownError"

  /pricing/history:
    get:
      summary: Get pricing history
      description: Returns up to 52 weekly pricing records for trend analysis
      tags:
        - Pricing
      responses:
        "200":
          description: Pricing history
          content:
            application/json:
              schema:
                type: object
                properties:
                  history:
                    type: array
                    items:
                      type: object
                    description: List of historical pricing records (most recent first)
                  count:
                    type: integer
                    description: Number of records returned
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/UnknownError"

  /pricing/questionnaire:
    get:
      summary: Get pricing questionnaire
      description: Returns the questionnaire questions and any existing responses for the tenant
      tags:
        - Pricing
      responses:
        "200":
          description: Questionnaire with questions and existing responses
          content:
            application/json:
              schema:
                type: object
                properties:
                  version:
                    type: string
                    description: Questionnaire version identifier
                  questions:
                    type: array
                    items:
                      $ref: "#/components/schemas/QuestionnaireQuestion"
                  existingResponses:
                    type: object
                    nullable: true
                    description: Previously submitted responses keyed by question ID
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/UnknownError"

    post:
      summary: Submit questionnaire responses
      description: Saves questionnaire responses and triggers an async pricing recalculation
      tags:
        - Pricing
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - version
                - responses
              properties:
                version:
                  type: string
                  description: Questionnaire version being answered
                responses:
                  type: array
                  items:
                    type: object
                    required:
                      - questionId
                      - answer
                    properties:
                      questionId:
                        type: string
                      answer: {}
                  minItems: 1
      responses:
        "200":
          description: Questionnaire saved and recalculation triggered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecalculateResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/UnknownError"

  /pricing/recalculate:
    post:
      summary: Trigger pricing recalculation
      description: Starts an on-demand pricing recalculation. Returns 409 if a recalculation is already in progress.
      tags:
        - Pricing
      responses:
        "200":
          description: Recalculation started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecalculateResponse"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          description: Recalculation already in progress
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  jobId:
                    type: string
                    description: ID of the existing in-progress job
        "500":
          $ref: "#/components/responses/UnknownError"

  /pricing/recalculate/{jobId}:
    parameters:
      - name: jobId
        in: path
        required: true
        schema:
          type: string
        description: The recalculation job ID
    get:
      summary: Get recalculation job status
      description: Poll the status of an in-progress pricing recalculation
      tags:
        - Pricing
      responses:
        "200":
          description: Job status
          content:
            application/json:
              schema:
                type: object
                properties:
                  jobId:
                    type: string
                  status:
                    type: string
                    enum: [processing, completed, failed]
                  result:
                    type: object
                    nullable: true
                    description: The pricing record (present when status is completed)
                  error:
                    type: string
                    nullable: true
                    description: Error message (present when status is failed)
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/UnknownError"

  /pricing/narrative:
    get:
      summary: Get sponsor-facing narrative
      description: |
        Returns the stored sponsor-facing value narrative generated during the last pricing calculation.
        The narrative is versioned with a pricingChecksum derived from the pricing data it was based on.
        Returns 409 if no pricing data exists or if the narrative has not been generated yet.
      tags:
        - Pricing
      responses:
        "200":
          description: Narrative with pricing version checksum
          content:
            application/json:
              schema:
                type: object
                properties:
                  narrative:
                    type: string
                    description: Sponsor-facing value narrative paragraph
                  pricingChecksum:
                    type: string
                    description: Checksum of the pricing data the narrative was generated from
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          description: No pricing data or narrative not yet generated
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    enum: [NoPricingData, NarrativeNotGenerated]
                  message:
                    type: string
        "500":
          $ref: "#/components/responses/UnknownError"

  /subscribers:
    get:
      summary: List subscribers
      description: >
        Returns subscriber data for the authenticated tenant. When called without
        the `type` query parameter, returns the full subscriber list with email,
        name, and subscription date. When `type=sunset` is provided, returns
        dormant subscribers for sunset policy evaluation.
      tags:
        - Subscribers
      parameters:
        - name: type
          in: query
          required: false
          schema:
            type: string
            enum: [sunset]
          description: Optional subscriber query type. Omit for full list, use `sunset` for dormant subscribers.
        - name: latestIssueNumber
          in: query
          required: false
          schema:
            type: integer
          description: The most recently published issue number (required when type=sunset)
        - name: threshold
          in: query
          required: false
          schema:
            type: integer
            default: 10
          description: Number of issues without engagement before a subscriber is considered dormant (used with type=sunset)
      responses:
        "200":
          description: Subscriber data. Shape depends on whether `type` is provided.
          content:
            application/json:
              schema:
                oneOf:
                  - type: object
                    description: Full subscriber list (no type param)
                    properties:
                      subscribers:
                        type: array
                        items:
                          type: object
                          properties:
                            email:
                              type: string
                              description: Subscriber email address
                            addedAt:
                              type: string
                              nullable: true
                              format: date-time
                              description: ISO 8601 date when the subscriber was added
                            firstName:
                              type: string
                              description: Subscriber first name
                            lastName:
                              type: string
                              description: Subscriber last name
                            lastEngagedIssue:
                              type: integer
                              nullable: true
                              description: Issue number of the subscriber's most recent engagement, or null if never engaged
                      total:
                        type: integer
                        description: Total number of subscribers returned
                  - type: object
                    description: Dormant subscribers (type=sunset)
                    properties:
                      dormantSubscribers:
                        type: array
                        items:
                          type: object
                          properties:
                            emailHash:
                              type: string
                              description: SHA-256 hash of the subscriber email
                            lastEngagedIssue:
                              type: integer
                              nullable: true
                              description: Issue number of the subscriber's most recent engagement, or null if never engaged
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/UnknownError"

  /subscribers/count:
    get:
      summary: Get current subscriber count
      description: Returns the current total subscriber count for the authenticated tenant.
      tags:
        - Subscribers
      responses:
        "200":
          description: Current subscriber count
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubscriberCountResponse"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/UnknownError"

  /subscribers/trends:
    get:
      summary: Get subscriber trends across recent issues
      description: Returns subscriber counts captured at send time for the most recent published issues, plus a summary of growth or decline across the returned range.
      tags:
        - Subscribers
      parameters:
        - name: issueCount
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 50
            default: 10
          description: Number of recent published issues to include
      responses:
        "200":
          description: Subscriber trend data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubscriberTrendsResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/UnknownError"

  /subscribers/health:
    get:
      summary: Get audience health cohort distribution
      description: Classifies all subscribers into engagement cohorts (highly engaged, occasional, dormant) based on recency of engagement relative to the latest issue. Returns a bootstrap indicator when no engagement data has been collected yet.
      tags:
        - Subscribers
      parameters:
        - name: latestIssueNumber
          in: query
          required: true
          schema:
            type: integer
          description: The most recently published issue number
      responses:
        "200":
          description: Audience health cohort distribution or bootstrap indicator
          content:
            application/json:
              schema:
                oneOf:
                  - type: object
                    description: Bootstrap state — no engagement data collected yet
                    properties:
                      bootstrap:
                        type: boolean
                        enum: [true]
                    required:
                      - bootstrap
                  - type: object
                    description: Cohort distribution with counts and percentages
                    properties:
                      cohorts:
                        type: object
                        properties:
                          highlyEngaged:
                            $ref: "#/components/schemas/CohortDetail"
                          occasional:
                            $ref: "#/components/schemas/CohortDetail"
                          dormant:
                            $ref: "#/components/schemas/CohortDetail"
                          total:
                            type: integer
                            description: Total number of subscribers
                        required:
                          - highlyEngaged
                          - occasional
                          - dormant
                          - total
                    required:
                      - cohorts
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/UnknownError"

  /segments:
    get:
      summary: List all segments
      description: Returns all segments for the authenticated tenant, sorted by creation date descending
      tags:
        - Segments
      responses:
        "200":
          description: List of segments
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListSegmentsResponse"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/UnknownError"

    post:
      summary: Create a new segment
      description: Creates a new named segment for the authenticated tenant. Segment names must be unique per tenant (case-insensitive).
      tags:
        - Segments
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSegmentRequest"
      responses:
        "201":
          description: Segment created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SegmentResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          $ref: "#/components/responses/Conflict"
        "500":
          $ref: "#/components/responses/UnknownError"

  /segments/{segmentId}:
    parameters:
      - name: segmentId
        in: path
        required: true
        schema:
          type: string
        description: The segment identifier
    get:
      summary: Get segment details
      description: Retrieves details of a specific segment
      tags:
        - Segments
      responses:
        "200":
          description: Segment details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SegmentResponse"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/UnknownError"

    put:
      summary: Update a segment
      description: Updates the name and/or description of an existing segment
      tags:
        - Segments
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSegmentRequest"
      responses:
        "200":
          description: Segment updated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SegmentResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "500":
          $ref: "#/components/responses/UnknownError"

    delete:
      summary: Delete a segment
      description: Deletes a segment and all its member records. Returns 200 for synchronous deletion (≤25 members) or 202 for asynchronous deletion (>25 members).
      tags:
        - Segments
      responses:
        "200":
          description: Segment deleted synchronously
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        "202":
          description: Segment deletion accepted (async cleanup in progress)
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/UnknownError"

  /segments/{segmentId}/members:
    parameters:
      - name: segmentId
        in: path
        required: true
        schema:
          type: string
        description: The segment identifier
    get:
      summary: List segment members
      description: Returns a paginated list of members in a segment with their engagement data
      tags:
        - Segments
      parameters:
        - name: pageSize
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
          description: Number of members per page (default 50, max 200)
        - name: nextToken
          in: query
          required: false
          schema:
            type: string
          description: Pagination token from previous response
      responses:
        "200":
          description: Paginated list of segment members
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListSegmentMembersResponse"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/UnknownError"

    post:
      summary: Add members to a segment
      description: Adds one or more subscribers to a segment. Non-existent subscribers are skipped.
      tags:
        - Segments
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddSegmentMembersRequest"
      responses:
        "200":
          description: Members added (with counts of added and skipped)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AddSegmentMembersResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/UnknownError"

    delete:
      summary: Remove members from a segment
      description: Removes one or more subscribers from a segment. Non-members are silently skipped.
      tags:
        - Segments
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RemoveSegmentMembersRequest"
      responses:
        "200":
          description: Members removed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RemoveSegmentMembersResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/UnknownError"

  /segments/{segmentId}/export:
    parameters:
      - name: segmentId
        in: path
        required: true
        schema:
          type: string
        description: The segment identifier
    post:
      summary: Export segment members
      description: Exports all members of a segment to a JSON file in S3. Returns the S3 key directly for segments with ≤1000 members, or a job ID for async export of larger segments.
      tags:
        - Segments
      responses:
        "200":
          description: Synchronous export completed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SegmentExportSyncResponse"
        "202":
          description: Async export started (poll job for status)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SegmentExportAsyncResponse"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/UnknownError"

  /segments/jobs/{jobId}:
    parameters:
      - name: jobId
        in: path
        required: true
        schema:
          type: string
        description: The async job identifier
    get:
      summary: Get segment job status
      description: Polls the status of an async segment operation (e.g., export). Returns the job status and result when completed.
      tags:
        - Segments
      responses:
        "200":
          description: Job status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SegmentJobStatusResponse"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/UnknownError"

components:
  parameters:
    Tenant:
      name: tenant
      in: path
      required: true
      schema:
        type: string
      description: The tenant identifier

  responses:
    Created:
      description: Successfully added into the system
      content:
        application/json:
          schema:
            type: object
            required:
              - message
            properties:
              message:
                type: string
                description: Message resulting from a creation
                example: Contact created
    BadRequest:
      description: Unable to process request. Likely due to improperly formatted request.
      content:
        application/json:
          schema:
            type: object
            required:
              - message
            properties:
              message:
                type: string
                description: Message detailing what went wrong
                example: The 'name' field is required and is missing.
    Forbidden:
      description: Access denied. User does not have permission to perform this action.
      content:
        application/json:
          schema:
            type: object
            required:
              - message
            properties:
              message:
                type: string
                description: Message explaining the access denial
                example: Admin access required
    NotFound:
      description: The requested entity was not found
      content:
        application/json:
          schema:
            type: object
            required:
              - message
            properties:
              message:
                type: string
                description: The requested entity was not found
                example: Vote not found
    Conflict:
      description: The request conflicts with the current state of the resource
      content:
        application/json:
          schema:
            type: object
            required:
              - message
            properties:
              message:
                type: string
                description: Explanation of the conflict
                example: Cannot modify published issues
    UnknownError:
      description: An unexpected error occurred on the server.
      content:
        application/json:
          schema:
            type: object
            required:
              - message
            properties:
              message:
                type: string
                description: Unknown error message
                example: An unexpected error occurred.

  schemas:
    SenderEmail:
      type: object
      required:
        - senderId
        - email
        - verificationType
        - verificationStatus
        - isDefault
        - createdAt
        - updatedAt
      properties:
        senderId:
          type: string
          description: Unique identifier for the sender
        email:
          type: string
          format: email
          description: Sender email address
        name:
          type: string
          description: Display name for the sender
        verificationType:
          type: string
          enum: [mailbox, domain]
          description: Type of verification used
        verificationStatus:
          type: string
          enum: [pending, verified, failed, verification_timed_out]
          description: Current verification status
        isDefault:
          type: boolean
          description: Whether this is the default sender for the tenant
        domain:
          type: string
          description: Domain name (for domain verification)
        createdAt:
          type: string
          format: date-time
          description: When the sender was created
        updatedAt:
          type: string
          format: date-time
          description: When the sender was last updated
        verifiedAt:
          type: string
          format: date-time
          description: When the sender was verified
        failureReason:
          type: string
          description: Reason for verification failure
        emailsSent:
          type: integer
          description: Total number of emails sent from this sender
        lastSentAt:
          type: string
          format: date-time
          description: When the last email was sent from this sender
        verificationExpiresAt:
          type: string
          format: date-time
          description: When the verification expires (24 hours after initiation)

    TierLimits:
      type: object
      required:
        - tier
        - maxSenders
        - currentCount
        - canUseDNS
        - canUseMailbox
      properties:
        tier:
          type: string
          enum: [free-tier, creator-tier, pro-tier]
          description: User's current tier
        maxSenders:
          type: integer
          description: Maximum number of senders allowed
        currentCount:
          type: integer
          description: Current number of senders configured
        canUseDNS:
          type: boolean
          description: Whether DNS verification is allowed
        canUseMailbox:
          type: boolean
          description: Whether mailbox verification is allowed

    DomainVerification:
      type: object
      required:
        - domain
        - verificationStatus
        - dnsRecords
        - instructions
      properties:
        domain:
          type: string
          description: Domain name being verified
        verificationStatus:
          type: string
          enum: [pending, verified, failed, verification_timed_out]
          description: Current verification status
        dnsRecords:
          type: array
          items:
            $ref: "#/components/schemas/DnsRecord"
          description: DNS records to add for verification
        instructions:
          type: array
          items:
            type: string
          description: Step-by-step verification instructions

    DnsRecord:
      type: object
      required:
        - name
        - type
        - value
        - description
      properties:
        name:
          type: string
          description: DNS record name
        type:
          type: string
          description: DNS record type (TXT, CNAME, etc.)
        value:
          type: string
          description: DNS record value
        description:
          type: string
          description: User-friendly description of the record

    CreateSenderRequest:
      type: object
      required:
        - email
        - verificationType
      properties:
        email:
          type: string
          format: email
          description: Email address to verify
        name:
          type: string
          description: Display name for the sender
        verificationType:
          type: string
          enum: [mailbox, domain]
          description: Type of verification to use

    UpdateSenderRequest:
      type: object
      properties:
        name:
          type: string
          description: Display name for the sender
        isDefault:
          type: boolean
          description: Whether to set as default sender

    VerifyDomainRequest:
      type: object
      required:
        - domain
      properties:
        domain:
          type: string
          description: Domain name to verify

    ListIssuesResponse:
      type: object
      required:
        - issues
      properties:
        issues:
          type: array
          items:
            $ref: "#/components/schemas/IssueListItem"
          description: List of issues
        nextToken:
          type: string
          description: Pagination token for next page (only present if more results available)

    IssueListItem:
      type: object
      required:
        - id
        - issueNumber
        - subject
        - status
        - createdAt
      properties:
        id:
          type: string
          description: Issue identifier (issue number as a string)
        issueNumber:
          type: integer
          description: Sequential issue number
        subject:
          type: string
          description: Issue subject
        status:
          type: string
          enum: [draft, scheduled, published, failed]
          description: Current issue status
        createdAt:
          type: string
          format: date-time
          description: When the issue was created
        publishedAt:
          type: string
          format: date-time
          description: When the issue was published (only for published issues)
        scheduledAt:
          type: string
          format: date-time
          description: When the issue is scheduled to be published (only for scheduled issues)

    CreateIssueRequest:
      type: object
      required:
        - subject
        - content
      properties:
        issueNumber:
          type: integer
          description: Optional issue number to assign (must be unique per tenant)
        subject:
          type: string
          maxLength: 200
          description: Issue subject
        content:
          type: string
          description: Issue content in markdown format
        scheduledAt:
          type: string
          description: When to schedule the issue for publishing (RFC3339 or "now")
        action:
          type: string
          enum: [draft, schedule]
          description: Controls whether the issue is created as a draft or scheduled immediately
        metadata:
          type: object
          description: Optional metadata for the issue

    CreateIssueResponse:
      type: object
      required:
        - id
        - issueNumber
        - subject
        - status
        - content
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
          description: Issue identifier
        issueNumber:
          type: integer
          description: Sequential issue number
        subject:
          type: string
          description: Issue subject
        status:
          type: string
          enum: [draft]
          description: Issue status (always 'draft' for new issues)
        content:
          type: string
          description: Issue content in markdown format
        createdAt:
          type: string
          format: date-time
          description: When the issue was created
        updatedAt:
          type: string
          format: date-time
          description: When the issue was last updated

    GetIssueResponse:
      type: object
      required:
        - id
        - issueNumber
        - subject
        - status
        - content
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
          description: Issue identifier (issue number as a string)
        issueNumber:
          type: integer
          description: Sequential issue number
        subject:
          type: string
          description: Issue subject
        status:
          type: string
          enum: [draft, scheduled, published, failed]
          description: Current issue status
        content:
          type: string
          description: Issue content in markdown format
        createdAt:
          type: string
          format: date-time
          description: When the issue was created
        updatedAt:
          type: string
          format: date-time
          description: When the issue was last updated
        publishedAt:
          type: string
          format: date-time
          description: When the issue was published (only for published issues)
        scheduledAt:
          type: string
          format: date-time
          description: When the issue is scheduled to be published (only for scheduled issues)
        metadata:
          type: object
          description: Optional metadata for the issue
        stats:
          $ref: "#/components/schemas/IssueStats"
        insights:
          type: array
          description: Generated insights for the issue (legacy, plain text)
          items:
            type: string
        insightsV2:
          type: array
          description: Structured insights with evidence
          items:
            $ref: "#/components/schemas/InsightV2"

    UpdateIssueRequest:
      type: object
      minProperties: 1
      properties:
        subject:
          type: string
          maxLength: 200
          description: Issue subject
        content:
          type: string
          description: Issue content in markdown format
        scheduledAt:
          type: string
          format: date-time
          description: When to schedule the issue for publishing
        metadata:
          type: object
          description: Optional metadata for the issue
        status:
          type: string
          enum:
            - published
          description: Set to 'published' to manually mark an in-progress or failed issue as published

    IssueStats:
      type: object
      required:
        - opens
        - clicks
        - deliveries
        - bounces
        - complaints
        - subscribers
      properties:
        opens:
          type: integer
          description: Number of email opens
        clicks:
          type: integer
          description: Number of link clicks
        deliveries:
          type: integer
          description: Number of successful deliveries
        bounces:
          type: integer
          description: Number of bounced emails
        complaints:
          type: integer
          description: Number of spam complaints
        subscribers:
          type: integer
          description: Subscriber count at send time
        analytics:
          $ref: "#/components/schemas/IssueAnalytics"

    InsightEvidence:
      type: object
      required:
        - metric
      properties:
        metric:
          type: string
        value:
          type: string
        benchmark:
          type: string
        deltaPct:
          type: string
        note:
          type: string

    InsightV2:
      type: object
      required:
        - type
        - severity
        - confidence
        - summary
        - recommendation
      properties:
        type:
          type: string
        severity:
          type: string
          enum: [info, watch, action]
        confidence:
          type: string
          enum: [low, med, high]
        summary:
          type: string
        recommendation:
          type: string
        evidence:
          type: array
          items:
            $ref: "#/components/schemas/InsightEvidence"

    TrendsResponse:
      type: object
      required:
        - issues
        - aggregates
      properties:
        issues:
          type: array
          items:
            $ref: "#/components/schemas/IssueTrendItem"
          description: List of recent published issues with metrics
        aggregates:
          $ref: "#/components/schemas/TrendAggregates"
          description: Aggregated statistics across all returned issues

    IssueTrendItem:
      type: object
      required:
        - id
        - metrics
      properties:
        id:
          type: string
          description: Issue identifier
        metrics:
          $ref: "#/components/schemas/IssueMetrics"
        analyticsSummary:
          $ref: "#/components/schemas/IssueAnalyticsSummary"

    IssueMetrics:
      type: object
      required:
        - openRate
        - clickRate
        - bounceRate
        - delivered
        - opens
        - clicks
        - bounces
        - complaints
        - subscribers
      properties:
        openRate:
          type: number
          format: double
          description: Open rate percentage (0-100)
        clickRate:
          type: number
          format: double
          description: Click rate percentage (0-100)
        bounceRate:
          type: number
          format: double
          description: Bounce rate percentage (0-100)
        delivered:
          type: integer
          format: int64
          description: Number of emails delivered
        opens:
          type: integer
          format: int64
          description: Number of opens
        clicks:
          type: integer
          format: int64
          description: Number of clicks
        bounces:
          type: integer
          format: int64
          description: Number of bounces
        complaints:
          type: integer
          format: int64
          description: Number of complaints
        subscribers:
          type: integer
          format: int64
          description: Subscriber count at send time

    TrendAggregates:
      type: object
      required:
        - avgOpenRate
        - avgClickRate
        - avgBounceRate
        - totalDelivered
        - issueCount
      properties:
        avgOpenRate:
          type: number
          format: double
          description: Average open rate across all issues
        avgClickRate:
          type: number
          format: double
          description: Average click rate across all issues
        avgBounceRate:
          type: number
          format: double
          description: Average bounce rate across all issues
        totalDelivered:
          type: integer
          format: int64
          description: Total emails delivered across all issues
        issueCount:
          type: integer
          description: Number of issues included in aggregates

    TopPerformer:
      type: object
      required:
        - id
        - subject
        - openRate
        - clickRate
      properties:
        id:
          type: string
          description: Issue identifier
        subject:
          type: string
          description: Issue subject
        openRate:
          type: number
          format: double
          description: Open rate for this issue
        clickRate:
          type: number
          format: double
          description: Click rate for this issue

    IssueAnalyticsSummary:
      type: object
      properties:
        engagementType:
          $ref: "#/components/schemas/EngagementType"
        trafficSource:
          $ref: "#/components/schemas/TrafficSource"

    IssueAnalytics:
      type: object
      required:
        - links
        - clickDecay
        - geoDistribution
        - deviceBreakdown
        - timingMetrics
        - engagementType
        - trafficSource
        - bounceReasons
        - complaintDetails
      properties:
        links:
          type: array
          items:
            $ref: "#/components/schemas/LinkPerformance"
        clickDecay:
          type: array
          items:
            $ref: "#/components/schemas/ClickDecayPoint"
        openDecay:
          type: array
          items:
            $ref: "#/components/schemas/OpenDecayPoint"
        geoDistribution:
          type: array
          items:
            $ref: "#/components/schemas/GeoData"
        deviceBreakdown:
          $ref: "#/components/schemas/DeviceBreakdown"
        timingMetrics:
          $ref: "#/components/schemas/TimingMetrics"
        engagementType:
          $ref: "#/components/schemas/EngagementType"
        trafficSource:
          $ref: "#/components/schemas/TrafficSource"
        bounceReasons:
          $ref: "#/components/schemas/BounceReasons"
        complaintDetails:
          type: array
          items:
            $ref: "#/components/schemas/ComplaintDetail"

    LinkPerformance:
      type: object
      required:
        - url
        - clicks
        - percentOfTotal
        - position
      properties:
        url:
          type: string
        clicks:
          type: integer
        percentOfTotal:
          type: number
        position:
          type: integer
        geoDistribution:
          type: array
          items:
            $ref: "#/components/schemas/GeoData"

    ClickDecayPoint:
      type: object
      required:
        - hour
        - clicks
        - cumulativeClicks
      properties:
        hour:
          type: integer
        clicks:
          type: integer
        cumulativeClicks:
          type: integer

    OpenDecayPoint:
      type: object
      required:
        - hour
        - opens
        - cumulativeOpens
      properties:
        hour:
          type: integer
        opens:
          type: integer
        cumulativeOpens:
          type: integer

    GeoData:
      type: object
      required:
        - country
        - clicks
      properties:
        country:
          type: string
        clicks:
          type: integer
        opens:
          type: integer
        uniqueClickUsers:
          type: integer
        uniqueOpenUsers:
          type: integer
        uniqueUsers:
          type: integer

    DeviceBreakdown:
      type: object
      required:
        - desktop
        - mobile
        - tablet
      properties:
        desktop:
          type: integer
        mobile:
          type: integer
        tablet:
          type: integer

    TimingMetrics:
      type: object
      required:
        - medianTimeToOpen
        - p95TimeToOpen
        - medianTimeToClick
        - p95TimeToClick
      properties:
        medianTimeToOpen:
          type: number
        p95TimeToOpen:
          type: number
        medianTimeToClick:
          type: number
        p95TimeToClick:
          type: number

    EngagementType:
      type: object
      required:
        - newClickers
        - returningClickers
      properties:
        newClickers:
          type: integer
        returningClickers:
          type: integer

    TrafficSource:
      type: object
      required:
        - clicks
      properties:
        clicks:
          type: object
          required:
            - email
            - web
          properties:
            email:
              type: integer
            web:
              type: integer

    BounceReasons:
      type: object
      required:
        - permanent
        - temporary
        - suppressed
      properties:
        permanent:
          type: integer
        temporary:
          type: integer
        suppressed:
          type: integer

    ComplaintDetail:
      type: object
      required:
        - email
        - timestamp
        - complaintType
      properties:
        email:
          type: string
        timestamp:
          type: string
          format: date-time
        complaintType:
          type: string

    QuestionnaireQuestion:
      type: object
      required:
        - id
        - category
        - text
        - type
      properties:
        id:
          type: string
          description: Question identifier (e.g. q1, q2)
        category:
          type: string
          description: Question category (e.g. audience_demographics, newsletter_niche)
        text:
          type: string
          description: The question text
        type:
          type: string
          enum: [single-select, multi-select, text]
          description: Input type for the question
        options:
          type: array
          items:
            type: string
          nullable: true
          description: Available options (for single-select and multi-select types)

    RecalculateResponse:
      type: object
      required:
        - jobId
        - status
      properties:
        jobId:
          type: string
          description: Unique identifier for the recalculation job
        status:
          type: string
          enum: [processing]
          description: Initial job status

    CohortDetail:
      type: object
      required:
        - count
        - percentage
      properties:
        count:
          type: integer
          description: Number of subscribers in this cohort
        percentage:
          type: number
          format: float
          description: Percentage of total subscribers in this cohort

    SubscriberCountResponse:
      type: object
      required:
        - totalSubscribers
      properties:
        totalSubscribers:
          type: integer
          description: Current total number of subscribers for the tenant

    SubscriberTrendPoint:
      type: object
      required:
        - issueNumber
        - subscribers
      properties:
        issueNumber:
          type: integer
          description: Published issue number
        subscribers:
          type: integer
          description: Subscriber count recorded when the issue was sent
        publishedAt:
          type: string
          format: date-time
          nullable: true
          description: Publish timestamp for the issue when available

    SubscriberTrendSummary:
      type: object
      required:
        - latestSubscribers
        - oldestSubscribers
        - netChange
        - percentageChange
        - pointsReturned
      properties:
        latestSubscribers:
          type: integer
          description: Subscriber count for the most recent point returned
        oldestSubscribers:
          type: integer
          description: Subscriber count for the oldest point returned
        netChange:
          type: integer
          description: Difference between latest and oldest subscriber counts
        percentageChange:
          type: number
          format: float
          description: Percentage change from the oldest point to the latest point
        pointsReturned:
          type: integer
          description: Number of trend points returned

    SubscriberTrendsResponse:
      type: object
      required:
        - points
        - summary
      properties:
        points:
          type: array
          items:
            $ref: "#/components/schemas/SubscriberTrendPoint"
        summary:
          $ref: "#/components/schemas/SubscriberTrendSummary"

    CreateSegmentRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
          description: Segment name (1-100 characters, unique per tenant case-insensitively)
        description:
          type: string
          maxLength: 500
          description: Optional segment description
      additionalProperties: false

    UpdateSegmentRequest:
      type: object
      minProperties: 1
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
          description: New segment name
        description:
          type: string
          maxLength: 500
          description: New segment description
      additionalProperties: false

    SegmentResponse:
      type: object
      required:
        - segmentId
        - name
        - memberCount
        - createdAt
      properties:
        segmentId:
          type: string
          description: Unique segment identifier (ULID)
        name:
          type: string
          description: Segment name (original casing)
        description:
          type: string
          nullable: true
          description: Optional segment description
        memberCount:
          type: integer
          description: Denormalized count of members (eventually consistent)
        createdAt:
          type: string
          format: date-time
          description: When the segment was created
        updatedAt:
          type: string
          format: date-time
          nullable: true
          description: When the segment was last updated

    ListSegmentsResponse:
      type: object
      required:
        - segments
      properties:
        segments:
          type: array
          items:
            $ref: "#/components/schemas/SegmentResponse"
          description: List of segments sorted by creation date descending

    SegmentMember:
      type: object
      required:
        - email
        - addedAt
      properties:
        email:
          type: string
          format: email
          description: Subscriber email address
        lastEngagedIssue:
          type: integer
          nullable: true
          description: Issue number of the subscriber's most recent engagement
        engagementCount:
          type: integer
          nullable: true
          description: Total engagement count for the subscriber
        addedAt:
          type: string
          format: date-time
          description: When the subscriber was added to the segment

    ListSegmentMembersResponse:
      type: object
      required:
        - members
        - totalCount
      properties:
        members:
          type: array
          items:
            $ref: "#/components/schemas/SegmentMember"
          description: List of segment members with engagement data
        totalCount:
          type: integer
          description: Total member count from segment record (eventually consistent)
        nextToken:
          type: string
          description: Pagination token for next page (only present if more results available)

    AddSegmentMembersRequest:
      type: object
      required:
        - emails
      properties:
        emails:
          type: array
          items:
            type: string
            format: email
          minItems: 1
          maxItems: 100
          description: List of subscriber emails to add (max 100)
      additionalProperties: false

    AddSegmentMembersResponse:
      type: object
      required:
        - added
        - skipped
      properties:
        added:
          type: integer
          description: Number of subscribers newly added to the segment
        skipped:
          type: integer
          description: Number of emails skipped (non-existent subscribers)
        skippedEmails:
          type: array
          items:
            type: string
          description: List of email addresses that were skipped

    RemoveSegmentMembersRequest:
      type: object
      required:
        - emails
      properties:
        emails:
          type: array
          items:
            type: string
            format: email
          minItems: 1
          maxItems: 100
          description: List of subscriber emails to remove (max 100)
      additionalProperties: false

    RemoveSegmentMembersResponse:
      type: object
      required:
        - removed
      properties:
        removed:
          type: integer
          description: Number of members actually removed

    SegmentExportSyncResponse:
      type: object
      required:
        - s3Key
      properties:
        s3Key:
          type: string
          description: S3 key where the export file is stored

    SegmentExportAsyncResponse:
      type: object
      required:
        - jobId
      properties:
        jobId:
          type: string
          description: Job identifier to poll for export completion

    SegmentJobStatusResponse:
      type: object
      required:
        - jobId
        - status
      properties:
        jobId:
          type: string
          description: Job identifier
        status:
          type: string
          enum: [pending, completed, failed]
          description: Current job status
        s3Key:
          type: string
          nullable: true
          description: S3 key for the export file (present when status is completed)
        error:
          type: string
          nullable: true
          description: Error message (present when status is failed)
